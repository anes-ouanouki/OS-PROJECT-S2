# Main project settings.
# This file keeps the main paths, delivery options, and alert limits.
# it is loaded by main.sh when the project starts,
# so most behavior can be changed without editing the scripts.

# This first part defines where reports and logs are stored.
# it lets the project use custom folders when needed,
# so generated files can be moved without changing the code.
REPORT_DIR="./reports"
LOG_DIR="./logs"

# This next part holds the email and remote delivery settings.
# it is used by the email and ssh modules,
# so sending reports does not require hardcoding values in the scripts.
RECIPIENT_EMAIL="kada9anes@gmail.com"
MSMTP_ACCOUNT="gmail"

REMOTE_USER="kadaa"
REMOTE_HOST="127.0.0.1"
REMOTE_REPORT_DIR="/home/kada/reports"

# This last part sets the main alert thresholds and report display limit.
# it controls when alerts are triggered and how many processes are shown,
# so the output stays practical for the user.
CPU_ALERT_THRESHOLD=80
DISK_ALERT_THRESHOLD=90
RAM_ALERT_THRESHOLD=85

MAX_PROCESS_DISPLAY=20
